<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: какой ты персонаж? | Убить Некроманта</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('siteTheme');
            let themeClass = '';

            if (savedTheme === 'light') {
                themeClass = 'theme-light';
            } else if (savedTheme === 'blue') {
                themeClass = 'theme-blue';
            } else if (savedTheme === 'system' || !savedTheme) {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                themeClass = isDark ? 'theme-dark' : 'theme-light';
            } else {
                themeClass = 'theme-dark';
            }

            document.body.classList.add(themeClass);
        })();
    </script>
    <main>
        <section class="section section-top-padding">
            <div class="container">
                <div class="section-header">
                    <h1>Тест: Какой ты персонаж?</h1>
                    <div class="section-line"></div>
                    <p>Ответь на вопросы и узнай, кто ты из вселенной «Убить Некроманта»</p>
                </div>
                <div class="quiz-custom-container">
                    <form id="quizForm">
                        <div class="quiz-question">
                            <label>1. Твой любимый вид оружия?</label>
                            <select name="q1" required>
                                <option disabled selected value="">Выберите вариант</option>
                                <option value="1">Меч и щит</option>
                                <option value="2">Магический посох</option>
                                <option value="3">Кинжалы и скрытность</option>
                                <option value="4">Тёмные ритуалы</option>
                            </select>
                        </div>
                        <div class="quiz-question">
                            <label>2. Что для тебя важнее всего?</label>
                            <select name="q2" required>
                                <option disabled selected value="">Выберите вариант</option>
                                <option value="1">Защита слабых</option>
                                <option value="2">Знания и мудрость</option>
                                <option value="3">Свобода и приключения</option>
                                <option value="4">Власть над смертью</option>
                            </select>
                        </div>
                        <div class="quiz-question">
                            <label>3. Враг повержен. Твои действия?</label>
                            <select name="q3" required>
                                <option disabled selected value="">Выберите вариант</option>
                                <option value="1">Устрою пир в честь победы</option>
                                <option value="2">Изучу его артефакты</option>
                                <option value="3">Исчезну в тени</option>
                                <option value="4">Воскрешу его как слугу</option>
                            </select>
                        </div>
                        <div class="quiz-question">
                            <label>4. Твой идеальный спутник?</label>
                            <select name="q4" required>
                                <option disabled selected value="">Выберите вариант</option>
                                <option value="1">Верный рыцарь</option>
                                <option value="2">Мудрый маг</option>
                                <option value="3">Ловкий вор</option>
                                <option value="4">Скелет-слуга</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary quiz-submit-btn">Узнать результат</button>
                    </form>
                    <div id="quizResult" class="quiz-result">
                        <h2>Твой персонаж: <span id="resultCharacter"></span></h2>
                        <p id="resultDesc"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
