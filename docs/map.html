<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта мира | Убить Некроманта</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <main>
        <section class="section section-top-padding">
            <div class="container">
                <div class="section-header">
                    <h1>Карта мира</h1>
                    <div class="section-line"></div>
                    <p>Кликните в любую точку карты — появится метка с координатами. Приближайте и перетаскивайте.</p>
                </div>
                <div id="interactiveMap" class="map-interactive">
                    <div class="map-pan-content" id="panContent">
                        <img class="map-image" id="mapImage" src="https://cdn.jsdelivr.net/gh/Negativ212/Website/image/Map.png" alt="Карта мира Междугорье" draggable="false">
                        <div class="map-markers" id="mapMarkers"></div>
                    </div>
                    <div class="map-controls">
                        <button class="map-zoom-btn" id="zoomInBtn">+</button>
                        <button class="map-zoom-btn" id="zoomOutBtn">−</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="../js/script.js"></script>
</body>
</html>
