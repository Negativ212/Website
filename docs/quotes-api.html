<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цитаты | Убить Некроманта</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <main>
        <section class="section quotes-api-section">
            <div class="container">
                <div class="section-header">
                    <h1>Цитаты</h1>
                    <div class="section-line"></div>
                    <p>Из книги «Убить Некроманта» и реального</p>
                </div>
                <div class="api-quote-box">
                    <div id="quoteText">Нажмите на любую кнопку</div>
                    <div class="quote-buttons">
                        <button id="localQuoteBtn" class="btn btn-primary">Из книги</button>
                        <button id="externalQuoteBtn" class="btn btn-secondary">Другая случайная</button>
                    </div>
                    <div id="errorMessage"></div>
                </div>
            </div>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
